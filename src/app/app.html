<main class="contenedor-app">
    <!-- ENCABEZADO -->
    <app-encabezado></app-encabezado>

    <!-- CONTENIDO PRINCIPAL -->
    <section class="area-contenido">
        <!-- LADO IZQUIERDO: USUARIOS -->
        <app-usuario [lista]="colaboradores" [activo]="colaboradorActual"
            (seleccion)="asignarColaborador($event)"></app-usuario>

        <!-- LADO DERECHO: TAREAS -->
        <app-tareas [colaborador]="colaboradorActual"></app-tareas>
    </section>
</main>
