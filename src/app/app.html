<main class="contenedor-app">
  
  <app-encabezado></app-encabezado>

  
  <section class="area-contenido">
    
    <app-usuario 
    [lista]="usuarios" 
    [activo]="usuarioActual" 
    (seleccion)="seleccionarUsuario($event)"><!--De Hijo a Padre -->
    </app-usuario>

    
    @if (usuarioActual) {
      <app-tareas 
      [usuario]="usuarioActual"
      [userId]="usuarioActual.id"><!--De Padre a Hijo -->
      </app-tareas>
    }
  </section>
</main>
