<div class="modal-backdrop" (click)="alCancelar()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <h3>Agregar Nueva Tarea</h3>

        <div class="form-group">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" [(ngModel)]="formulario.titulo" placeholder="Ej: Diseñar interfaz">
        </div>

        <div class="form-group">
            <label for="tiempo">Tiempo (horas)</label>
            <input type="number" id="tiempo" [(ngModel)]="formulario.tiempo" min="1" placeholder="Ej: 2">
        </div>

        <div class="form-group">
            <label for="resumen">Descripción</label>
            <textarea id="resumen" [(ngModel)]="formulario.resumen" placeholder="Detalles de la tarea..."></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn-cancelar" (click)="alCancelar()">Cancelar</button>
            <button class="btn-guardar" [disabled]="!formulario.titulo || !formulario.tiempo || !formulario.resumen"
                (click)="alAgregar()">Agregar Tarea</button>
        </div>
    </div>
</div>
