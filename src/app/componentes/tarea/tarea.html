<app-tarjeta [completada]="tarea.terminada">
    <div class="tarea-contenido">
        <h3 class="tarea-titulo">{{ tarea.titulo | titlecase }}</h3>
        <p class="tarea-tiempo">{{ tarea.tiempo }}</p>
        <p class="tarea-resumen">{{ tarea.resumen }}</p>
        <p class="tarea-fecha">{{ tarea.fecha | date:'dd/MM/yyyy' }}</p>
    </div>
    <div class="tarea-acciones">
        <button class="btn-terminada" [class.done]="tarea.terminada" (click)="completar()">
            {{ tarea.terminada ? 'Terminada' : 'Terminada' }}
        </button>
    </div>
</app-tarjeta>
