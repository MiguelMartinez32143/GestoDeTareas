<article class="panel-tareas">
    @if (usuario()) {
    <div class="panel-header">
        <h2>Tareas de {{ usuario()!.nombre }}</h2>
        <button class="btn-agregar" (click)="abrirModal()">Agregar Tarea Nueva</button>
    </div>

    <div class="lista-tareas">
        @for (tarea of usuario()!.tareas; track tarea.id) {
        <app-tarea [tarea]="tarea" (terminada)="eliminarTarea($event)"></app-tarea>
        }
    </div>

    @if (mostrarModal) {
    <app-tarea-nueva 
        (cerrar)="cancelarTarea()" 
        (agregar)="agregarTarea($event)">
    </app-tarea-nueva>
    }
    }
</article>
