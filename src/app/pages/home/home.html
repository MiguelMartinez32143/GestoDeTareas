<div class="pantalla">
  <!-- HEADER -->
  <div class="cabecera">
    <div class="icono">
      <img src="img/img1.png" alt="Lista de tareas">
    </div>
    <h1>TAREA FACIL</h1>
    <p class="subtitulo">Administrador de Tareas ADSO</p>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div class="contenedor-principal">
    <!-- LADO IZQUIERDO: USUARIOS -->
    <div class="sidebar">
      @for (user of users; track user.id) {
        <div
          class="persona"
          [class.activo]="selectedUser?.id === user.id"
          (click)="selectUser(user)"
        >
          <img [src]="user.avatar" [alt]="user.name" class="foto" />
          <span>{{ user.name }}</span>
        </div>
      }
    </div>

    <!-- LADO DERECHO: DETALLES -->
    <div class="detalle">
      @if (selectedUser) {
        <h2>{{ selectedUser.name }}</h2>
      }
    </div>
  </div>
</div>
